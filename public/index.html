<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProjectHub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-left">
        <h1>Project<span>Hub</span></h1>
        <span class="subtitle">Centro de Control</span>
      </div>
      <div class="header-right">
        <div class="stats" id="stats"></div>
        <button class="theme-toggle" id="theme-toggle" title="Cambiar tema">&#9790;</button>
      </div>
    </header>

    <div class="layout">
      <aside id="sidebar">
        <div class="search-box">
          <input type="text" id="search" placeholder="Buscar proyecto..." />
        </div>
        <div class="filter-buttons">
          <button class="filter active" data-filter="all">Todos</button>
          <button class="filter" data-filter="favorites">Favoritos</button>
          <button class="filter" data-filter="in-progress">En progreso</button>
          <button class="filter" data-filter="unknown">Sin estado</button>
          <button class="filter" data-filter="done">Terminados</button>
        </div>
        <ul id="project-list"></ul>
      </aside>

      <main id="main-content">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">&#128640;</div>
          <h2>Seleccioná un proyecto</h2>
          <p>Elegí un proyecto del panel izquierdo para ver detalles, ejecutar servidores o enviar prompts a Claude.</p>
        </div>
        <div id="project-detail" class="hidden"></div>
      </main>

      <aside id="terminal-panel" class="hidden">
        <div class="terminal-header">
          <span id="terminal-title">Terminal</span>
          <div class="terminal-actions">
            <button id="terminal-clear" title="Limpiar">&#128465;</button>
            <button id="terminal-close" title="Cerrar">&#10005;</button>
          </div>
        </div>
        <div id="terminal-output"></div>
      </aside>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
