<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProjectHub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-left">
        <h1>Project<span>Hub</span></h1>
        <span class="subtitle">Centro de Control</span>
      </div>
      <div class="header-right">
        <div class="stats" id="stats"></div>
        <button class="theme-toggle" id="theme-toggle" title="Cambiar tema">&#9790;</button>
      </div>
    </header>

    <div class="layout">
      <aside id="sidebar">
        <div class="search-box">
          <input type="text" id="search" placeholder="Buscar proyecto..." />
        </div>
        <div class="filter-buttons">
          <button class="filter active" data-filter="all">Todos</button>
          <button class="filter" data-filter="favorites">Favoritos</button>
        </div>
        <ul id="project-list"></ul>
      </aside>
      <div id="sidebar-resizer"></div>

      <main id="main-content">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">&#128640;</div>
          <h2>Selecciona un proyecto</h2>
          <p>Elegi un proyecto del panel izquierdo para ver detalles, ejecutar servidores o abrir Claude Code.</p>
          <button class="btn-scan" id="scan-btn" onclick="scanProjects()" style="margin-top:16px">Escanear proyectos</button>
          <p id="scan-feedback" style="margin-top:8px;font-size:13px;color:var(--text-hint)"></p>
        </div>
        <div id="project-detail" class="hidden"></div>
      </main>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
